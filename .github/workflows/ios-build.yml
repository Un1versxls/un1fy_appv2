name: Build iOS App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest
    
    - name: Show directory structure
      run: |
        echo "Workspace: $GITHUB_WORKSPACE"
        pwd
        ls -la
    
    - name: Update xcodeproj
      run: |
        rm -rf build/
        if [ -f "$GITHUB_WORKSPACE/update_pbxproj.py" ]; then
          python3 "$GITHUB_WORKSPACE/update_pbxproj.py" || echo "Update script not found or failed, continuing..."
        fi
    
    - name: Build
      run: |
        xcodebuild archive \
          -project "$GITHUB_WORKSPACE/DRIVE.xcodeproj" \
          -scheme DRIVE \
          -configuration Release \
          -sdk iphoneos \
          -derivedDataPath "$GITHUB_WORKSPACE/build" \
          -archivePath "$GITHUB_WORKSPACE/build/DRIVE.xcarchive" \
          CODE_SIGNING_ALLOWED=NO
    
    - name: Create ExportOptions.plist
      run: |
        cat > "$GITHUB_WORKSPACE/ExportOptions.plist" << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
        </dict>
        </plist>
        EOF
    
    - name: Export IPA
      run: |
        xcodebuild -exportArchive \
          -archivePath "$GITHUB_WORKSPACE/build/DRIVE.xcarchive" \
          -exportOptionsPlist "$GITHUB_WORKSPACE/ExportOptions.plist" \
          -exportPath "$GITHUB_WORKSPACE/build"
    
    - name: Show build output
      run: |
        ls -la "$GITHUB_WORKSPACE/build/"
        find "$GITHUB_WORKSPACE/build/" -name "*.ipa" -type f
    
    - name: Upload IPA
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: DRIVE-ipa
        path: ${{ github.workspace }}/build/DRIVE.ipa
        retention-days: 30