name: Build iOS App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest
        
    - name: Display Xcode version
      run: xcodebuild -version
      
    - name: List project files
      run: |
        echo "Current directory: $(pwd)"
        ls -la
      
    - name: Find Xcode project or workspace
      id: find_project
      run: |
        echo "Checking for xcodeproj in: $(pwd)"
        ls -la *.xcodeproj 2>/dev/null || echo "No xcodeproj at root"
        ls -la */.xcodeproj 2>/dev/null || echo "No xcodeproj in subdirs"
        
    - name: Build archive
      run: |
        cd /Users/runner/work/un1fy_appv2/un1fy_appv2
        xcodebuild archive \
          -project ./DRIVE.xcodeproj \
          -scheme DRIVE \
          -configuration Release \
          -sdk iphoneos \
          -derivedDataPath ./build/DerivedData \
          -archivePath ./build/DRIVE.xcarchive \
          CODE_SIGNING_ALLOWED=NO
      
    - name: Verify archive was created
      run: |
        ls -la /Users/runner/work/un1fy_appv2/un1fy_appv2/build/
        ls -la /Users/runner/work/un1fy_appv2/un1fy_appv2/build/DRIVE.xcarchive/ 2>/dev/null || echo "Archive not found at expected location"
        
    - name: Create ExportOptions.plist
      run: |
        cat > ExportOptions.plist << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>method</key>
            <string>development</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>teamID</key>
            <string></string>
        </dict>
        </plist>
        EOF
          
    - name: Verify IPA was created
      run: |
        ls -la /Users/runner/work/un1fy_appv2/un1fy_appv2/build/export/
        ls -la /Users/runner/work/un1fy_appv2/un1fy_appv2/build/export/DRIVE.ipa 2>/dev/null && echo "IPA successfully created!" || echo "IPA not found"
        
    - name: Upload IPA
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: DRIVE-ipa
        path: /Users/runner/work/un1fy_appv2/un1fy_appv2/build/export/DRIVE.ipa
        retention-days: 30